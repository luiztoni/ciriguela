version: "3"
#run with docker-compose up -d
services:
  # Database
  mariadb:
    image: mariadb:10.9
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: mypassword
      MYSQL_DATABASE: mydb
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypassword
    ports:
      - "3306:3306"
    logging:
      driver: syslog
      options:
        tag: "{{.DaemonName}}(image={{.ImageName}};name={{.Name}};id={{.ID}})"
    networks:
      - db_network
    restart: on-failure
    volumes:
      - mariadb_data:/var/lib/mysql

  # phpmyadmin
  phpmyadmin:
    depends_on:
      - mariadb
    image: phpmyadmin
    restart: always
    ports:
      - "8090:80"
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
      MYSQL_ROOT_PASSWORD: mypassword
    networks:
      - db_network

  app:
    image: 'ciriguela:latest'
    build:
      context: .
    container_name: ciriguela
    depends_on:
      - mariadb
    environment:
      - DB_CONNECTION=mariadb
      - DB_USER=myuser
      - DB_PASSWORD=mypassword
      - ADMIN_EMAIL=admin@admin.com.br
      - ADMIN_PASSWORD=adminpass
    networks:
      - db_network

networks:
  db_network:
    driver: bridge

volumes:
  mariadb_data:
